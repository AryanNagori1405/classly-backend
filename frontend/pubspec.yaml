name: classly_frontend
description: A Flutter app for Classly learning platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  dio: ^5.3.0
  get_it: ^7.5.0
  video_player: ^2.7.0
  chewie: ^1.7.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.0
  smooth_page_indicator: ^1.1.0
  badges: ^3.1.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env